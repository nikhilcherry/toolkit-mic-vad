<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>MicVAD — venue calibration</title>
<style>
  :root { color-scheme: dark; }
  body {
    font-family: system-ui, sans-serif;
    max-width: 640px;
    margin: 2rem auto;
    padding: 0 1rem;
    background: #111;
    color: #eee;
  }
  h1 { font-size: 1.25rem; }
  .row { margin: 1rem 0; }
  .meter {
    width: 100%;
    height: 28px;
    background: #222;
    border: 1px solid #444;
    border-radius: 4px;
    overflow: hidden;
  }
  .meter-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #2b6, #ec3);
    transition: width 60ms linear;
  }
  .indicator {
    display: inline-block;
    padding: 0.35rem 0.9rem;
    border-radius: 999px;
    font-weight: 600;
    background: #333;
  }
  .indicator.voiced { background: #2b6; color: #002; }
  button {
    font-size: 1rem;
    padding: 0.5rem 1.1rem;
    margin-right: 0.5rem;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #log {
    height: 220px;
    overflow-y: auto;
    background: #000;
    border: 1px solid #333;
    padding: 0.5rem;
    font-family: ui-monospace, monospace;
    font-size: 0.85rem;
    white-space: pre-wrap;
  }
  #error {
    color: #f66;
    font-weight: 600;
    min-height: 1.2em;
  }
  label { display: block; margin-bottom: 0.25rem; }
</style>
</head>
<body>
  <h1>MicVAD — venue calibration</h1>

  <div class="row">
    <button id="startBtn">Start</button>
    <button id="stopBtn" disabled>Stop</button>
    <span id="indicator" class="indicator">silent</span>
  </div>

  <div id="error"></div>

  <div class="row">
    <label for="threshold">Threshold: <span id="thresholdValue">0.012</span></label>
    <input id="threshold" type="range" min="0.001" max="0.15" step="0.001" value="0.012" style="width: 100%;" />
  </div>

  <div class="row">
    <label>Level (RMS)</label>
    <div class="meter"><div id="meterFill" class="meter-fill"></div></div>
  </div>

  <div class="row">
    <label>Chunk log</label>
    <div id="log"></div>
  </div>

  <script type="module">
    import { MicVAD } from './mic-vad.js';

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const indicator = document.getElementById('indicator');
    const errorEl = document.getElementById('error');
    const thresholdSlider = document.getElementById('threshold');
    const thresholdValue = document.getElementById('thresholdValue');
    const meterFill = document.getElementById('meterFill');
    const log = document.getElementById('log');

    const vad = new MicVAD({ threshold: parseFloat(thresholdSlider.value) });

    thresholdSlider.addEventListener('input', () => {
      vad.threshold = parseFloat(thresholdSlider.value);
      thresholdValue.textContent = vad.threshold.toFixed(3);
    });

    vad.on('level', (rms) => {
      // RMS of typical speech rarely exceeds ~0.3; scale meter accordingly.
      const pct = Math.min(100, (rms / 0.3) * 100);
      meterFill.style.width = `${pct}%`;
    });

    vad.on('speechStart', () => {
      indicator.textContent = 'voiced';
      indicator.classList.add('voiced');
    });

    vad.on('speechEnd', () => {
      indicator.textContent = 'silent';
      indicator.classList.remove('voiced');
    });

    vad.on('chunk', ({ audio, t0, t1 }) => {
      const durationSec = (audio.length / vad.sampleRate).toFixed(2);
      const line = `chunk: ${durationSec}s  (t0=${t0.toFixed(0)}ms → t1=${t1.toFixed(0)}ms)  samples=${audio.length}`;
      const div = document.createElement('div');
      div.textContent = line;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    });

    startBtn.addEventListener('click', async () => {
      errorEl.textContent = '';
      startBtn.disabled = true;
      try {
        await vad.start();
        stopBtn.disabled = false;
      } catch (err) {
        errorEl.textContent = err.message;
        startBtn.disabled = false;
      }
    });

    stopBtn.addEventListener('click', () => {
      vad.stop();
      stopBtn.disabled = true;
      startBtn.disabled = false;
      indicator.textContent = 'silent';
      indicator.classList.remove('voiced');
      meterFill.style.width = '0%';
    });
  </script>
</body>
</html>
