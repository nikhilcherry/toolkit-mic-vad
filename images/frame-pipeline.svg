<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="380" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#111">Inside the AudioWorklet: 128-sample quanta &#8594; ~33ms analysis frames</text>

  <!-- render quanta -->
  <text x="30" y="70" font-size="12.5" font-weight="600" fill="#111">process() render quanta (128 samples each, called ~375&#215;/sec by the audio thread)</text>
  <g>
    <rect x="30" y="85" width="52" height="40" rx="4" fill="#dbeafe" stroke="#2563eb"/>
    <rect x="90" y="85" width="52" height="40" rx="4" fill="#dbeafe" stroke="#2563eb"/>
    <rect x="150" y="85" width="52" height="40" rx="4" fill="#dbeafe" stroke="#2563eb"/>
    <rect x="210" y="85" width="52" height="40" rx="4" fill="#dbeafe" stroke="#2563eb"/>
    <text x="56" y="109" text-anchor="middle" font-size="10.5" fill="#1e3a8a">128</text>
    <text x="116" y="109" text-anchor="middle" font-size="10.5" fill="#1e3a8a">128</text>
    <text x="176" y="109" text-anchor="middle" font-size="10.5" fill="#1e3a8a">128</text>
    <text x="236" y="109" text-anchor="middle" font-size="10.5" fill="#1e3a8a">128</text>
    <text x="290" y="110" text-anchor="middle" font-size="16" fill="#999">&#8230;</text>
  </g>

  <!-- arrow down into ring buffer -->
  <path d="M150,125 L150,150" fill="none" stroke="#444" stroke-width="2" marker-end="url(#arrow3)"/>
  <text x="330" y="148" font-size="11.5" fill="#444">appended sample-by-sample into an internal Float32Array</text>

  <!-- accumulator buffer -->
  <rect x="30" y="165" width="500" height="46" rx="6" fill="#fff7e6" stroke="#b45309" stroke-width="2"/>
  <text x="280" y="193" text-anchor="middle" font-size="12" fill="#111" font-weight="600">this._buffer  (length = frameSamples, e.g. 533 @ 16kHz &#8776; 30 Hz)</text>

  <!-- writeIndex marker -->
  <line x1="330" y1="165" x2="330" y2="211" stroke="#b91c1c" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="330" y="230" text-anchor="middle" font-size="10" fill="#b91c1c">_writeIndex</text>

  <!-- when full -->
  <path d="M280,211 L280,240" fill="none" stroke="#444" stroke-width="2" marker-end="url(#arrow3)"/>
  <text x="480" y="253" text-anchor="middle" font-size="11.5" fill="#444">once full: copy &#43; reset index to 0</text>

  <!-- postMessage -->
  <rect x="130" y="265" width="300" height="50" rx="8" fill="#eef6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="280" y="286" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111">port.postMessage(copy, [copy.buffer])</text>
  <text x="280" y="303" text-anchor="middle" font-size="10.5" fill="#444">zero-copy transfer to the main thread</text>

  <path d="M430,290 L560,290" fill="none" stroke="#444" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- main thread -->
  <rect x="570" y="265" width="300" height="50" rx="8" fill="#fff7e6" stroke="#b45309" stroke-width="2"/>
  <text x="720" y="286" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111">MicVAD._onFrame(frame)</text>
  <text x="720" y="303" text-anchor="middle" font-size="10.5" fill="#444">RMS &#183; isSpeech() &#183; hangover &#183; chunk buffer</text>

  <text x="450" y="355" text-anchor="middle" font-size="11" fill="#666">Worklet thread (audio rendering) &#8202;|&#8202; Main thread (JS event loop) &#8212; separated by the postMessage boundary above</text>
</svg>
