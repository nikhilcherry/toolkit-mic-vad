<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" width="980" height="560" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="980" height="560" fill="#ffffff"/>
  <text x="490" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#111">MicVAD data flow</text>

  <!-- Row 1: capture pipeline -->
  <g font-size="12.5" fill="#111">
    <rect x="20" y="45" width="140" height="64" rx="8" fill="#f3f4f6" stroke="#333"/>
    <text x="90" y="82" text-anchor="middle" font-weight="600">Microphone</text>

    <rect x="195" y="45" width="170" height="64" rx="8" fill="#f3f4f6" stroke="#333"/>
    <text x="280" y="72" text-anchor="middle" font-weight="600">getUserMedia()</text>
    <text x="280" y="88" text-anchor="middle" font-size="10.5" fill="#444">echoCancellation,</text>
    <text x="280" y="100" text-anchor="middle" font-size="10.5" fill="#444">noiseSuppression, mono</text>

    <rect x="400" y="45" width="150" height="64" rx="8" fill="#f3f4f6" stroke="#333"/>
    <text x="475" y="72" text-anchor="middle" font-weight="600">AudioContext</text>
    <text x="475" y="90" text-anchor="middle" font-size="10.5" fill="#444">{ sampleRate }</text>

    <rect x="585" y="45" width="170" height="64" rx="8" fill="#f3f4f6" stroke="#333"/>
    <text x="670" y="82" text-anchor="middle" font-weight="600">MediaStreamSource</text>

    <rect x="790" y="45" width="170" height="64" rx="8" fill="#eef6ff" stroke="#2563eb"/>
    <text x="875" y="72" text-anchor="middle" font-weight="600">AudioWorkletNode</text>
    <text x="875" y="88" text-anchor="middle" font-size="10.5" fill="#444">processor inlined</text>
    <text x="875" y="100" text-anchor="middle" font-size="10.5" fill="#444">via Blob URL</text>
  </g>

  <line x1="160" y1="77" x2="193" y2="77" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="365" y1="77" x2="398" y2="77" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="550" y1="77" x2="583" y2="77" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="755" y1="77" x2="788" y2="77" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 2: postMessage -->
  <rect x="765" y="150" width="215" height="54" rx="8" fill="#eef6ff" stroke="#2563eb"/>
  <text x="872" y="172" text-anchor="middle" font-size="12.5" font-weight="600" fill="#111">port.postMessage(frame)</text>
  <text x="872" y="188" text-anchor="middle" font-size="10.5" fill="#444">~30 frames/sec, transferable</text>
  <line x1="875" y1="109" x2="875" y2="148" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 3: MicVAD core -->
  <rect x="330" y="255" width="320" height="100" rx="10" fill="#fff7e6" stroke="#b45309" stroke-width="2"/>
  <text x="490" y="280" text-anchor="middle" font-size="13.5" font-weight="700" fill="#111">MicVAD (main thread)</text>
  <text x="490" y="300" text-anchor="middle" font-size="11.5" fill="#444">isSpeech(frame) → RMS vs threshold</text>
  <text x="490" y="317" text-anchor="middle" font-size="11.5" fill="#444">hangover state machine</text>
  <text x="490" y="334" text-anchor="middle" font-size="11.5" fill="#444">chunk buffer + overlap retention</text>

  <path d="M872,204 L872,230 L490,230 L490,253" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 4: events -->
  <g font-size="12" fill="#111">
    <rect x="30" y="405" width="240" height="58" rx="8" fill="#f3f4f6" stroke="#333"/>
    <text x="150" y="428" text-anchor="middle" font-weight="600">emit('level', rms)</text>
    <text x="150" y="444" text-anchor="middle" font-size="10.5" fill="#444">~30×/sec → UI meter</text>

    <rect x="330" y="405" width="320" height="58" rx="8" fill="#eafbea" stroke="#15803d"/>
    <text x="490" y="428" text-anchor="middle" font-weight="600">emit('speechStart' / 'speechEnd')</text>
    <text x="490" y="444" text-anchor="middle" font-size="10.5" fill="#444">drives vad.isVoiced</text>

    <rect x="710" y="405" width="240" height="58" rx="8" fill="#fdeaea" stroke="#b91c1c"/>
    <text x="830" y="428" text-anchor="middle" font-weight="600">emit('chunk', {audio,t0,t1})</text>
    <text x="830" y="444" text-anchor="middle" font-size="10.5" fill="#444">Float32Array @ sampleRate</text>
  </g>

  <path d="M490,355 L150,355 L150,403" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="490" y1="355" x2="490" y2="403" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M490,355 L830,355 L830,403" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 5: consumers -->
  <g font-size="12" fill="#111">
    <rect x="330" y="495" width="320" height="46" rx="8" fill="#ffffff" stroke="#15803d" stroke-dasharray="4 3"/>
    <text x="490" y="523" text-anchor="middle" font-weight="600">AttributionFuser.record(isVoiced)</text>

    <rect x="710" y="495" width="240" height="46" rx="8" fill="#ffffff" stroke="#b91c1c" stroke-dasharray="4 3"/>
    <text x="830" y="523" text-anchor="middle" font-weight="600">on-device ASR (Whisper)</text>
  </g>
  <line x1="490" y1="463" x2="490" y2="493" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="830" y1="463" x2="830" y2="493" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
