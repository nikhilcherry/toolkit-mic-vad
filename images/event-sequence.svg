<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" width="960" height="400" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="400" fill="#ffffff"/>
  <text x="480" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#111">Event sequence over one session</text>

  <!-- main timeline -->
  <line x1="60" y1="200" x2="920" y2="200" stroke="#888" stroke-width="1.5"/>
  <line x1="60" y1="196" x2="60" y2="204" stroke="#888" stroke-width="1.5"/>
  <line x1="920" y1="196" x2="920" y2="204" stroke="#888" stroke-width="1.5"/>
  <text x="60" y="220" text-anchor="middle" font-size="11" fill="#666">t = 0</text>
  <text x="920" y="220" text-anchor="middle" font-size="11" fill="#666">stop()</text>

  <text x="480" y="46" text-anchor="middle" font-size="10.5" fill="#2563eb">emit('level', rms) fires continuously throughout (~30&#215;/sec) &#8212; omitted below for clarity</text>

  <!-- event markers -->
  <!-- start() -->
  <circle cx="100" cy="200" r="5" fill="#111"/>
  <line x1="100" y1="200" x2="100" y2="160" stroke="#111" stroke-width="1.5"/>
  <text x="100" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#111">start()</text>
  <text x="100" y="136" text-anchor="middle" font-size="9.5" fill="#666">user gesture</text>

  <!-- speechStart 1 -->
  <circle cx="220" cy="200" r="5" fill="#15803d"/>
  <line x1="220" y1="200" x2="220" y2="160" stroke="#15803d" stroke-width="1.5"/>
  <text x="220" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">speechStart</text>
  <rect x="220" y="196" width="160" height="8" fill="#bbf7d0"/>

  <!-- speechEnd 1 -->
  <circle cx="380" cy="200" r="5" fill="#b91c1c"/>
  <line x1="380" y1="200" x2="380" y2="238" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="380" y="254" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">speechEnd</text>
  <text x="380" y="268" text-anchor="middle" font-size="9.5" fill="#666">after hangoverMs</text>

  <!-- chunk 1 (fires right at speechEnd, buffer had reached chunkSec) -->
  <circle cx="380" cy="200" r="9" fill="none" stroke="#b91c1c" stroke-width="2"/>
  <line x1="380" y1="280" x2="380" y2="298" stroke="#b91c1c" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <rect x="270" y="300" width="220" height="34" rx="6" fill="#fdeaea" stroke="#b91c1c"/>
  <text x="380" y="321" text-anchor="middle" font-size="10.5" font-weight="600" fill="#111">emit('chunk') &#8212; normal flush</text>

  <!-- speechStart 2 (continuous speech leading to hard flush) -->
  <circle cx="470" cy="200" r="5" fill="#15803d"/>
  <line x1="470" y1="200" x2="470" y2="160" stroke="#15803d" stroke-width="1.5"/>
  <text x="470" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">speechStart</text>
  <rect x="470" y="196" width="280" height="8" fill="#bbf7d0"/>

  <!-- chunk 2 (hard flush mid-speech, no speechEnd yet) -->
  <circle cx="660" cy="200" r="9" fill="none" stroke="#b91c1c" stroke-width="2"/>
  <circle cx="660" cy="200" r="5" fill="#b91c1c"/>
  <line x1="660" y1="200" x2="660" y2="187" stroke="#b91c1c" stroke-width="1.5"/>
  <line x1="660" y1="167" x2="660" y2="154" stroke="#b91c1c" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <rect x="560" y="120" width="200" height="34" rx="6" fill="#fdeaea" stroke="#b91c1c"/>
  <text x="660" y="141" text-anchor="middle" font-size="10.5" font-weight="600" fill="#111">emit('chunk') &#8212; hard flush</text>
  <text x="660" y="180" text-anchor="middle" font-size="9.5" fill="#666">isVoiced still true</text>

  <!-- speechEnd 2 -->
  <circle cx="750" cy="200" r="5" fill="#b91c1c"/>
  <line x1="750" y1="200" x2="750" y2="240" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="750" y="260" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">speechEnd</text>

  <!-- stop() -->
  <circle cx="880" cy="200" r="5" fill="#111"/>
  <line x1="880" y1="200" x2="880" y2="160" stroke="#111" stroke-width="1.5"/>
  <text x="880" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#111">stop()</text>

  <!-- legend -->
  <rect x="60" y="360" width="16" height="8" fill="#bbf7d0"/>
  <text x="82" y="367" font-size="10.5" fill="#444">isVoiced = true (speech + hangover window)</text>
  <circle cx="420" cy="364" r="5" fill="none" stroke="#b91c1c" stroke-width="2"/>
  <text x="435" y="367" font-size="10.5" fill="#444">'chunk' emitted here</text>
</svg>
